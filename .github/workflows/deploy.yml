name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  checks:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: |
          npm run type-check --if-present
          npm run typecheck --if-present

      - name: Tests
        env:
          MONGODB_TEST_URI: mongodb://127.0.0.1:27017/immobilier_test
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

  deploy:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            REPO="${{ github.event.repository.name }}"
            APP_DIR="/opt/apps/$REPO"

            echo "=== Deploying $REPO ==="
            cd "$APP_DIR"
            git pull origin main

            if [ -f compose.prod.yaml ]; then
              CF="compose.prod.yaml"
            elif [ -f docker-compose.prod.yml ]; then
              CF="docker-compose.prod.yml"
            else
              CF="docker-compose.yml"
            fi

            echo "Using compose file: $CF"

            if [ -f .env.production ]; then
              docker compose -f "$CF" --env-file .env.production up -d --build
            elif [ -f .env.prod ]; then
              cp .env.prod .env.production
              docker compose -f "$CF" --env-file .env.production up -d --build
            else
              docker compose -f "$CF" up -d --build
            fi

            echo "✓ Deploy complete"
