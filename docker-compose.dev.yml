# =============================================
# DOCKER COMPOSE - DEVELOPMENT OVERRIDE
# Immobilier API (Node.js/Express)
# =============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================

services:
  # =============================================
  # API - Development Mode
  # =============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: immobilier_api_dev
    restart: unless-stopped
    ports:
      - "4003:4003"
    volumes:
      - ./src:/app/src:cached
      - ./data:/app/data:cached
      - ./package.json:/app/package.json:cached
      - ./tsconfig.json:/app/tsconfig.json:cached
      - ./jest.config.js:/app/jest.config.js:cached
      - node_modules:/app/node_modules
      - api_logs:/app/logs
    environment:
      - NODE_ENV=development
      - PORT=4003
      - API_VERSION=v1
      - API_PREFIX=/api
      - MONGODB_URI=mongodb://mongodb:27017/immobilier_dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=dev-super-secret-jwt-key-for-development-only-change-in-production
      - JWT_ACCESS_EXPIRATION=7d
      - JWT_REFRESH_EXPIRATION=30d
      - LOG_LEVEL=debug
      - DEFAULT_LANGUAGE=en
      - SUPPORTED_LANGUAGES=en,fr,de,it
      - BCRYPT_SALT_ROUNDS=12
      - DEFAULT_PAGE_SIZE=20
      - MAX_PAGE_SIZE=100
      # Rate limiting (increased for E2E testing)
      - RATE_LIMIT_MAX_REQUESTS_GUEST=10000
      - RATE_LIMIT_MAX_REQUESTS_AUTH=10000
    
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CORS_CREDENTIALS=true
      # Translation Services
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - TRANSLATION_PROVIDER=libretranslate
      # Cloudinary Configuration
      - CLOUDINARY_CLOUD_NAME=dzyyygr1x
      - CLOUDINARY_API_KEY=393749481964766
      - CLOUDINARY_API_SECRET=lIQ4qNH1CRKz2P3dMSgXRxb2_CE
      - CLOUDINARY_FOLDER=immobilier_node
      # Email Configuration (Mailpit for development)
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USER=
      - MAIL_PASSWORD=
      - MAIL_FROM=noreply@immobilier.ch
      - MAIL_FROM_NAME=Immobilier.ch
      - MAIL_SECURE=false
      - EMAIL_QUEUE_CONCURRENCY=3
      - EMAIL_QUEUE_MAX_RETRIES=3
      # Frontend URL for email links
      - FRONTEND_URL=${FRONTEND_URL}
      - FRONTEND_ADMIN_URL=${FRONTEND_ADMIN_URL}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - immobilier_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================
  # MongoDB - Primary Database
  # =============================================
  mongodb:
    image: mongo:7.0
    container_name: immobilier_mongodb
    restart: unless-stopped
    ports:
      - "27020:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      - MONGO_INITDB_DATABASE=immobilier_dev
    networks:
      - immobilier_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s    

  # =============================================
  # MongoDB Express - Database UI
  # =============================================
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: immobilier_mongo_express
    restart: unless-stopped
    ports:
      - "8084:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=adminpassword
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - immobilier_network

  # =============================================
  # Redis - Cache & Sessions
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: immobilier_redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - immobilier_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s    

  # =============================================
  # Redis Commander - Redis UI
  # =============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: immobilier_redis_commander
    restart: unless-stopped
    ports:
      - "8085:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
      - HTTP_USER=admin
      - HTTP_PASSWORD=adminpassword
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - immobilier_network

   # =============================================
  # LibreTranslate - Free Self-Hosted Translation
  # =============================================
  libretranslate:
    image: libretranslate/libretranslate:v1.6.1
    container_name: immobilier_libretranslate
    restart: unless-stopped
    user: root
    ports:
      - "5050:5000"
    environment:
      - LT_API_KEYS=false
      - LT_LOAD_ONLY=en,fr,de,it
      - LT_UPDATE_MODELS=false
      - LT_SUGGESTIONS=false
      - LT_DISABLE_WEB_UI=false
    volumes:
      - libretranslate_models:/home/libretranslate/.local/share/argos-translate/packages
    networks:
      - immobilier_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/languages"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G    

  # =============================================
  # Mailpit - Email Testing
  # =============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: immobilier_mailpit
    restart: unless-stopped
    ports:
      - "8026:8025"
      - "1026:1025"
    environment:
      - MP_MAX_MESSAGES=5000
      - MP_DATA_FILE=/data/mailpit.db
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    volumes:
      - mailpit_data:/data
    networks:
      - immobilier_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/"]
      interval: 30s
      timeout: 5s
      retries: 3

# =============================================
# Networks
# =============================================
networks:
  immobilier_network:
    name: immobilier_network
    driver: bridge

# =============================================
# Additional Volumes
# =============================================
volumes:
  node_modules:
    name: immobilier_node_modules_dev
  api_logs:
    name: immobilier_api_logs_dev
  mailpit_data:
    name: immobilier_mailpit_data_dev
  mongodb_data:
    name: immobilier_mongodb_data
  mongodb_config:
    name: immobilier_mongodb_config
  redis_data:
    name: immobilier_redis_data
  libretranslate_models:
    name: immobilier_libretranslate_models  
